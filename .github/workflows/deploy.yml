name: Deploy ConnecDNA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ota-update:
    name: OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas update --branch production --message "Deploy ${{ github.sha }}"
        env:
          EXPO_PUBLIC_API_URL: https://www.connecdna.com
          EXPO_PUBLIC_ENV: production

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: ota-update
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: echo "${{ secrets.GOOGLE_SERVICES }}" | base64 -d > google-service-account.json
      - run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_PUBLIC_API_URL: https://www.connecdna.com
